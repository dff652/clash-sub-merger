# ===== Clash 订阅合并脚本配置（示例模版）=====
# 使用方法：复制此文件为 config.yaml，填入你自己的订阅链接
#   cp conf/config.example.yaml conf/config.yaml

# GlaDOS 订阅链接（按客户端类型区分，登录 GlaDOS 后台获取）
glados_urls:
  mihomo: "https://update.glados-config.com/mihomo/<your-id>/<your-token>/<your-port>/glados.yaml"
  clash: "https://update.glados-config.com/clash/<your-id>/<your-token>/<your-port>/glados.yaml"



# 订阅下载保存目录
download_dir: "download"

# 节点数最低阈值（低于此值视为异常数据，拒绝覆盖已有文件）
min_proxy_count: 5

# Sub-Store 组合订阅链接
sub_store_url: "http://<your-host>:<port>/<your-token>/download/collection/<collection-name>"

# Sub-Store provider 名称
sub_store_provider_name: "sub_allin1"

# 输出目录
output_dir: "output"

# 日志目录
log_dir: "logs"

# 规则模版文件路径
rules_template_file: "conf/rules_template.yaml"

# 代理组方案目录
profiles_dir: "profiles"

# 默认方案名（mihomo / clash / custom / vps）
default_profile: "mihomo"

# proxy-providers 健康检查配置
provider_interval: 3600
provider_health_check_interval: 600
provider_health_check_url: "http://www.gstatic.cn/generate_204"
