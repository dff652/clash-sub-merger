# ===== 方案：default =====
# 完整方案：GlaDOS + VPS（RackNerd + Vultr 合并）
#
# 使用：python merge_glados.py -p default
#
# 引用语法：
#   {US}  → 展开为 US 分类的所有 GlaDOS 节点
#   {TW}  → 展开为 TW 分类的所有 GlaDOS 节点
#   可用分类（新订阅）: TW, Balancer, US, JP, SG

proxy_groups:
  # --- VPS 节点（从 Sub-Store 获取，合并）---
  - name: VPS
    type: select
    use: ["{PROVIDER}"]

  # --- 自动测速组 ---
  - name: Auto-Fast
    type: url-test
    url: "http://www.gstatic.cn/generate_204"
    interval: 120
    tolerance: 100
    proxies: ["{TW}"]

  - name: Auto-Edge
    type: url-test
    url: "http://www.gstatic.cn/generate_204"
    interval: 600
    tolerance: 100
    proxies: ["{Balancer}", "{US}"]

  - name: Auto-Failover
    type: url-test
    url: "http://www.gstatic.cn/generate_204"
    interval: 300
    tolerance: 100
    proxies: ["{US}"]

  # --- 故障转移组 ---
  - name: Express
    type: fallback
    url: "http://www.gstatic.cn/generate_204"
    interval: 600
    tolerance: 100
    proxies: ["Auto-Edge", "Auto-Fast", "Auto-Failover", "VPS"]

  - name: Auto
    type: fallback
    url: "http://www.gstatic.cn/generate_204"
    interval: 300
    proxies: ["Auto-Fast", "Auto-Edge", "Auto-Failover", "VPS"]

  # --- 手动选择组 ---
  - name: Proxy
    type: select
    proxies: ["Auto", "VPS", "{US}", "{JP}", "{TW}", "{SG}"]

  - name: Video
    type: select
    interval: 900
    url: "http://www.gstatic.cn/generate_204"
    proxies: ["Express", "{US}", "{JP}", "{TW}", "{SG}"]

  - name: Netflix
    type: select
    url: "http://www.gstatic.cn/generate_204"
    interval: 1200
    proxies: ["{TW}", "{JP}", "Auto-Edge", "DIRECT"]

  - name: Scholar
    type: select
    url: "http://www.gstatic.cn/generate_204"
    interval: 300
    tolerance: 100
    proxies: ["{US}", "{JP}", "Proxy", "DIRECT"]

  - name: Steam
    type: select
    proxies: ["{US}", "Auto-Edge", "DIRECT"]
