# ===== 方案：clash =====
# 自动同步自 GlaDOS clash 订阅（2026-02-26 13:43:28）
# 运行 python sync_profiles.py -t clash 更新此文件

needs_glados: true
glados_client: clash

proxy_groups:
  # --- VPS 节点（Sub-Store，追加）---
  - name: VPS
    type: select
    use: ["{PROVIDER}"]

  - name: Auto
    type: url-test
    url: "http://www.gstatic.cn/generate_204"
    interval: 120
    tolerance: 100
    proxies:
      - "Fast-TW-B2-1"
      - "Fast-TW-B2-2"
      - "Fast-TW-B2-3"
      - "US-IPv6-N1-1"
      - "US-IPv6-N1-2"
      - "US-IPv6-N1-3"
      - "US-IPv6-N2-1"
      - "US-IPv6-N2-2"
      - "US-IPv6-N2-3"

  - name: Express
    type: url-test
    url: "http://www.gstatic.cn/generate_204"
    interval: 300
    tolerance: 100
    proxies:
      - "Fast-Balancer-B1-1"
      - "Fast-Balancer-B1-2"
      - "Fast-Balancer-B1-3"
      - "US-1"
      - "US-2"
      - "US-3"
      - "US-X02-D1-1"
      - "US-X02-D1-2"
      - "US-X02-D1-3"
      - "US-X10-D2-1"
      - "US-X10-D2-2"
      - "US-X10-D2-3"

  - name: Download
    type: select
    proxies:
      - "US-X02-D1-1"
      - "US-X02-D1-2"
      - "US-X02-D1-3"
      - "US-X10-D2-1"
      - "US-X10-D2-2"
      - "US-X10-D2-3"
      - "DIRECT"

  - name: Microsoft
    type: select
    proxies:
      - "US-IPv6-N1-1"
      - "US-IPv6-N1-2"
      - "US-IPv6-N1-3"
      - "US-IPv6-N2-1"
      - "US-IPv6-N2-2"
      - "US-IPv6-N2-3"
      - "DIRECT"

  - name: PrivateIP
