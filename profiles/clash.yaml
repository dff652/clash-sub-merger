      - "US-IPv6-N2-2"
      - "US-IPv6-N2-3"

  - name: Premium
    type: select
    url: "http://www.gstatic.cn/generate_204"
    interval: 300
    tolerance: 100
    proxies:
      - "US-IPv6-N1-1"
      - "US-IPv6-N1-2"
      - "US-IPv6-N1-3"
      - "US-IPv6-N2-1"
      - "US-IPv6-N2-2"
      - "US-IPv6-N2-3"
